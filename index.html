<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kaya Driving School Social Media Hub. Connect with us on Instagram, Facebook, and Google Reviews. Learn to drive with safety and confidence in Canberra.">
  <meta name="keywords" content="Kaya Driving School, Canberra driving lessons, driving school Canberra, social links, contact Kaya driving school">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Kaya Driving School - Social Media Hub">
  <meta property="og:description" content="Connect with us on our social platforms, read our latest reviews, and visit our official website.">
  <meta property="og:image" content="assets/logo.png">
  <meta property="og:url" content="https://kayadrivingschool.com.au/">
  <meta property="og:type" content="website">

  <title>Kaya Driving School | Social Media Hub</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">
  
  <!-- Styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Ambient Glow Blobs -->
  <div class="bg-ambient">
    <div class="bg-glow-blob blob-1"></div>
    <div class="bg-glow-blob blob-2"></div>
    <div class="bg-glow-blob blob-3"></div>
  </div>

  <!-- Background Particles Canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Centered Glassmorphic Container -->
  <div class="landing-wrapper">
    <div class="landing-container">
      
      <!-- Top Section -->
      <header class="top-header">
        <!-- Semi-circular glass shape coming from the top center -->
        <div class="glass-semicircle">
          <!-- White card wrapper to ensure brand logo displays clearly on dark background -->
          <div class="logo-wrapper">
            <img src="assets/logo.png" alt="Kaya Driving School Logo" class="business-logo">
          </div>
        </div>
        
        <!-- Circular profile image overlapping the bottom of the semi-circle -->
        <div class="profile-image-container" id="profile-trigger">
          <img src="assets/instructor.png" alt="Gaurang - Kaya Driving School Instructor" class="profile-image">
        </div>
        
        <!-- Business name and tagline -->
        <div class="business-info">
          <h1 class="business-name">Kaya Driving School</h1>
          <p class="business-tagline">Canberra's Premium Driving Instruction</p>
        </div>
      </header>
      
      <!-- Main Content -->
      <main class="main-content">
        <h2 class="main-heading">Connect With Us</h2>
        <p class="main-subheading">Follow us on social media and stay updated</p>
      </main>
      
      <!-- Social Media Grid -->
      <section class="social-grid">
        
        <!-- Instagram Card -->
        <a href="https://www.instagram.com/kayadrivingschool?igsh=Ymh5NDc4amoybjkz" target="_blank" rel="noopener noreferrer" class="social-card card-instagram">
          <div class="card-top">
            <div class="card-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
              </svg>
            </div>
            <div class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-arrow">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="card-title">Instagram</div>
            <div class="card-subtitle">@kayadrivingschool</div>
          </div>
        </a>
        
        <!-- Facebook Card -->
        <a href="https://www.facebook.com/share/1EX7otXBEW/" target="_blank" rel="noopener noreferrer" class="social-card card-facebook">
          <div class="card-top">
            <div class="card-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon">
                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
              </svg>
            </div>
            <div class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-arrow">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="card-title">Facebook</div>
            <div class="card-subtitle">Kaya Driving School</div>
          </div>
        </a>
        
        <!-- Google Review Card -->
        <a href="https://maps.app.goo.gl/H5s3r7mKUKgNbX4x7?g_st=ac" target="_blank" rel="noopener noreferrer" class="social-card card-google">
          <div class="card-top">
            <div class="card-icon-wrap">
              <svg viewBox="0 0 24 24" class="svg-icon" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
              </svg>
            </div>
            <div class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-arrow">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="card-title">Google Review</div>
            <div class="card-subtitle">5.0 Star Rating</div>
          </div>
        </a>
        
        <!-- TikTok Card -->
        <a href="https://tiktok.com" target="_blank" rel="noopener noreferrer" class="social-card card-tiktok">
          <div class="card-top">
            <div class="card-icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon">
                <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path>
              </svg>
            </div>
            <div class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-arrow">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </div>
          </div>
          <div class="card-bottom">
            <div class="card-title">TikTok</div>
            <div class="card-subtitle">Driving Tips & Videos</div>
          </div>
        </a>
        
      </section>
      
      <!-- Website Button -->
      <div class="website-btn-wrapper">
        <a href="https://kayadrivingschool.com.au/" target="_blank" rel="noopener noreferrer" class="website-btn">
          <div class="btn-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <span>Visit Our Website</span>
          </div>
          <div class="btn-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="svg-icon-arrow">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </div>
        </a>
      </div>
      
      <!-- Footer Credits -->
      <footer class="footer-credits">
        &copy; 2026 Kaya Driving School
      </footer>
      
    </div>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
